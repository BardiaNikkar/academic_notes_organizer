{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> {% block title %} Academic Notes Organizer {% endblock %} </title>
    <link rel = "stylesheet" href = "{% static 'css/base.css' %}">
    {% block extra_css %}
    {% endblock %} 
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="/"> Academic Notes Organizer </a>
            </div>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">Login</a></li>
            </ul>
        </nav>
    </header>
    <main class="container">

        {% endblock %}
    </main>
    <footer>
        <p>© 2026 Academic Notes Organizer</p>
    </footer>    
</body>
</html>
